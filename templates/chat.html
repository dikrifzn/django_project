<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat Room</title>
    <style>
        body{
            padding: 0;
            margin: 0;
        }
        .container{
            background-color: aqua;
            width: 100%;
            height: 100vh;
            display: flex;
        }
        .sidebar{
            background-color: black;
            width: 50px;
            height: 100vh;
        }
        .list_chat{
            background-color: gray;
            width: 300px;
            height: 100vh;
        }
        .content{
            width: 100%;
        }
        .bubblechat{
            border: 2px solid #dedede;
            background-color: #f1f1f1;
            border-radius: 5px;
            padding: 10px;
            margin: 10px 0;
        }
        .darker {
            border-color: #ccc;
            background-color: #ddd;
        }

        /* Clear floats */
        .bubblechat::after {
            content: "";
            clear: both;
            display: table;
        }

        /* Style images */
        .bubblechat img {
            float: left;
            max-width: 60px;
            width: 100%;
            margin-right: 20px;
            border-radius: 50%;
            
        }

        /* Style the right image */
        .bubblechat img.right {
            float: right;
            margin-left: 20px;
            margin-right:0;
        }

        /* Style time text */
        .time-right {
            float: right;
            color: #aaa;
        }

        /* Style time text */
        .time-left {
            float: left;
            color: #999;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="sidebar"></div>
        <div class="list_chat"></div>
        <div class="content">
            <div class="bubblechat">
                <img src="jokowi.jpeg" alt="Avatar">
                <p>Hello. How are you today?</p>
                <span class="time-right">11:00</span>
            </div>
            <div class="bubblechat darker">
                <img src="me.jpg" alt="Avatar" class="right">
                <p>Hey! I'm fine. Thanks for asking!</p>
                <span class="time-left">11:01</span>
              </div>
        </div>
    </div>
</body>
</html>
